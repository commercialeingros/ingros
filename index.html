<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giacenze Ingros</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ingros App">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { color: #dc2626; font-weight: bold; }
        .modal-bottom { transform: translateY(100%); transition: transform 0.3s ease-out; }
        .modal-bottom.active { transform: translateY(0); }
        .card-giacenza { border-left: 4px solid #dc2626; }
    </style>
    
</head>
    
<body class="bg-gray-100 pb-24">

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8 text-center">
        <img src="data/IngrosCoperture.jpg" class="w-64 mb-10 shadow-lg rounded-lg" onerror="this.src='https://via.placeholder.com/200?text=LOGO+INGROS'">
        <h2 class="text-xl font-bold text-gray-700 mb-6">ACCESSO AGENTI ESTERNI</h2>
        <input type="password" id="access-code" placeholder="Inserisci Codice Accesso" class="w-full max-w-xs border-2 border-gray-300 rounded-xl p-4 text-center text-2xl mb-4 focus:border-red-600 outline-none">
        <button onclick="checkAccess()" class="bg-red-600 text-white font-bold py-4 px-12 rounded-xl w-full max-w-xs shadow-lg active:scale-95 transition-transform">ENTRA</button>
        <p id="login-error" class="text-red-600 mt-4 hidden font-semibold italic">Codice errato o utente disabilitato</p>
    </div>

    <div id="app-content" class="hidden">
        
        <header class="bg-white shadow-md sticky top-0 z-40 p-4">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 id="current-category-title" class="text-2xl font-black text-gray-800 uppercase tracking-tight">Copertura</h1>
                    <p id="user-welcome" class="text-xs text-gray-500 font-bold uppercase"></p>
                </div>
                <div class="flex gap-4 items-center">
                    <button onclick="toggleSettings()" class="text-gray-400 hover:text-red-600"><i class="fa-solid fa-circle-user text-2xl"></i></button>
                    <button onclick="toggleFilters()" class="bg-red-600 text-white p-2 rounded-lg shadow-md"><i class="fa-solid fa-sliders"></i></button>
                </div>
            </div>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="global-search" oninput="applyFilters()" placeholder="Cerca descrizione o codice..." class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2 px-10 outline-none focus:ring-2 focus:ring-red-600">
            </div>
        </header>

        <main id="card-list" class="p-3 space-y-3">
            </main>

        <div id="filter-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-end">
            <div class="bg-white w-full p-6 rounded-t-3xl shadow-2xl space-y-4 max-h-[85vh] overflow-y-auto">
                <div class="flex justify-between items-center border-b pb-3">
                    <h3 class="font-bold text-lg">FILTRI AVANZATI</h3>
                    <button onclick="resetFilters()" class="text-red-600 text-sm font-bold">RESETTA</button>
                </div>
                <div id="filter-rows" class="space-y-4 pt-2">
                    </div>
                <button onclick="toggleFilters()" class="w-full bg-black text-white py-4 rounded-xl font-bold mt-4">APPLICA FILTRI</button>
            </div>
        </div>

        <div id="settings-modal" class="fixed inset-0 bg-white z-[70] hidden p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black">IMPOSTAZIONI</h2>
                <button onclick="toggleSettings()" class="text-3xl text-gray-400">&times;</button>
            </div>
            <div class="space-y-6">
                <h3 class="font-bold border-b pb-2">RUBRICA UNITÀ LOCALI (WhatsApp)</h3>
                <div id="rubrica-list" class="space-y-4">
                    </div>
                <button onclick="saveRubrica()" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold">SALVA RUBRICA</button>
            </div>
        </div>

        <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 z-50">
            <button onclick="switchTab('copertura')" id="tab-copertura" class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-house-flood-water text-xl"></i><span class="text-[10px] mt-1">COPERTURA</span>
            </button>
            <button onclick="switchTab('parete')" id="tab-parete" class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-border-all text-xl"></i><span class="text-[10px] mt-1">PARETE</span>
            </button>
            <button onclick="switchTab('policarbonati')" id="tab-policarbonati" class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-sun text-xl"></i><span class="text-[10px] mt-1">POLICARB.</span>
            </button>
            <button onclick="switchTab('lam_grecate')" id="tab-lam_grecate" class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-align-justify text-xl"></i><span class="text-[10px] mt-1">GRECATE</span>
            </button>
        </nav>
    </div>

    <script>
        // --- CONFIGURAZIONE ---
        let currentData = [];
        let currentTab = 'copertura';
        let currentUser = null;
        let rubrica = {}; // Inizia vuota, verrà popolata dal file o dal localStorage

        // --- CARICAMENTO RUBRICA ---
        async function loadRubrica() {
            // 1. Prova a caricare la rubrica personalizzata dal telefono (localStorage)
            const localRubrica = localStorage.getItem('ingros_rubrica');
    
            if (localRubrica) {
                rubrica = JSON.parse(localRubrica);
            } else {
            // 2. Se non esiste, scarica quella predefinita da GitHub
            try {
                const resp = await fetch(`data/rubrica.json?v=${Date.now()}`);
                rubrica = await resp.json();
                // Salva una copia locale come base
                localStorage.setItem('ingros_rubrica', JSON.stringify(rubrica));
            } catch (err) {
                console.error("Errore nel caricamento della rubrica esterna");
                // Fallback di emergenza
                rubrica = { "Modugno": "000", "Piacenza": "000" };
            }
            }
        }
        // Aggiorna la funzione checkAccess per includere il caricamento rubrica
async function checkAccess() {
    const inputCode = document.getElementById('access-code').value;
    try {
        const resp = await fetch(`data/users.json?v=${Date.now()}`);
        const users = await resp.json();
        currentUser = users.find(u => u.codice === inputCode);

        if (currentUser) {
            await loadRubrica(); // <-- Carica la rubrica dopo il login
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('user-welcome').innerText = `${currentUser.nome} ${currentUser.cognome}`;
            switchTab('copertura');
        } else {
            document.getElementById('login-error').classList.remove('hidden');
        }
    } catch (err) { alert("Errore connessione server."); }
}
        
        // --- NAVIGAZIONE & CARICAMENTO ---
        async function switchTab(tab) {
            currentTab = tab;
            document.getElementById('current-category-title').innerText = tab.replace('_', ' ');
            
            // UI Tab active
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');

            try {
                const resp = await fetch(`data/${tab}.json?v=${Date.now()}`);
                currentData = await resp.json();
                
                // Ordina per lunghezza decrescente (se esiste il campo)
                currentData.sort((a, b) => (parseFloat(b.Lunghezza) || 0) - (parseFloat(a.Lunghezza) || 0));
                
                generateFilterUI();
                applyFilters();
            } catch (err) { alert("File non trovato su GitHub."); }
        }

        // --- FILTRI DINAMICI ---
        function generateFilterUI() {
            const container = document.getElementById('filter-rows');
            container.innerHTML = "";
            let fields = [];

            if (currentTab === 'copertura' || currentTab === 'parete') {
                fields = ["Unita_locale", "Modello", "Isolante", "Altezza", "SP_EST", "Colore_EST"];
            } else if (currentTab === 'policarbonati') {
                fields = ["Unita_locale", "Modello", "Spessore", "Colore"];
            } else {
                fields = ["Unita_locale", "Tipo_Materiale", "Colore", "Spessore"];
            }

            fields.forEach(f => {
                const values = [...new Set(currentData.map(item => item[f]))].filter(v => v).sort();
                let options = `<option value="">Tutti - ${f.replace('_', ' ')}</option>`;
                values.forEach(v => options += `<option value="${v}">${v}</option>`);
                
                container.innerHTML += `
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">${f}</label>
                        <select id="filter-${f}" onchange="applyFilters()" class="w-full border rounded-lg p-2 bg-gray-50">${options}</select>
                    </div>`;
            });
        }

        function applyFilters() {
            const search = document.getElementById('global-search').value.toLowerCase();
            let filtered = currentData.filter(item => {
                // Filtro testo
                const matchSearch = JSON.stringify(item).toLowerCase().includes(search);
                // Filtri select
                const selectFilters = document.querySelectorAll('#filter-rows select');
                let matchSelect = true;
                selectFilters.forEach(s => {
                    const field = s.id.replace('filter-', '');
                    if (s.value && item[field] != s.value) matchSelect = false;
                });
                return matchSearch && matchSelect;
            });

            renderCards(filtered);
        }

        // --- RENDERING CARD ---
        function renderCards(data) {
            const container = document.getElementById('card-list');
            container.innerHTML = data.map(item => `
                <div class="bg-white p-4 rounded-xl shadow-sm card-giacenza relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-red-100 text-red-600 px-3 py-1 font-black rounded-bl-xl text-lg">
                        ${item['Quantita_1'] || 0} <span class="text-[10px] font-normal">${item['UM_1'] || 'PZ'}</span>
                    </div>
                    <div class="text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-widest">${item.Unita_locale}</div>
                    <div class="font-black text-gray-800 text-lg leading-tight mb-1">${item.Articolo}</div>
                    <div class="text-xs text-gray-500 font-medium mb-3">${item.Descrizione}</div>
                    
                    <div class="grid grid-cols-2 gap-2 text-[11px] bg-gray-50 p-2 rounded-lg">
                        <div><span class="text-gray-400">Modello:</span> ${item.Modello || '-'}</div>
                        <div><span class="text-gray-400">Dim.:</span> ${item.Lunghezza || '-'} x ${item.Altezza || '-'}</div>
                        <div><span class="text-gray-400">Colore:</span> ${item.Colore_EST || item.Colore || '-'}</div>
                        <div><span class="text-gray-400">Isol.:</span> ${item.Isolante || item.Spessore || '-'}</div>
                    </div>

                    <button onclick="sendWA('${item.Unita_locale}', '${item.Articolo}')" 
                            class="mt-3 w-full bg-green-500 text-white py-2 rounded-lg flex items-center justify-center gap-2 font-bold text-sm active:bg-green-600">
                        <i class="fa-brands fa-whatsapp text-lg"></i> RICHIEDI INFO
                    </button>
                </div>
            `).join('');
        }

        // --- WHATSAPP & IMPOSTAZIONI ---
        function sendWA(sede, art) {
            const num = rubrica[sede] || "";
            if(!num) { alert("Numero non impostato per questa sede"); return; }
            const msg = `Ciao, sono ${currentUser.nome}. Richiedo disponibilità per articolo: ${art} presso sede ${sede}.`;
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
        }

        function toggleSettings() {
            const mod = document.getElementById('settings-modal');
            if (mod.classList.contains('hidden')) {
                const list = document.getElementById('rubrica-list');
                list.innerHTML = Object.keys(rubrica).map(s => `
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-gray-400 uppercase">${s}</label>
                        <input type="text" value="${rubrica[s]}" data-sede="${s}" class="border p-3 rounded-xl bg-gray-50 font-mono">
                    </div>
                `).join('');
                mod.classList.remove('hidden');
            } else { mod.classList.add('hidden'); }
        }

        function saveRubrica() {
            document.querySelectorAll('#rubrica-list input').forEach(i => {
                rubrica[i.dataset.sede] = i.value;
            });
            localStorage.setItem('ingros_rubrica', JSON.stringify(rubrica));
            alert("Rubrica salvata sul telefono!");
            toggleSettings();
        }

        function toggleFilters() {
            const m = document.getElementById('filter-modal');
            m.classList.toggle('hidden');
        }

        function resetFilters() {
            document.querySelectorAll('#filter-rows select').forEach(s => s.value = "");
            document.getElementById('global-search').value = "";
            applyFilters();
        }

    </script>
</body>
</html>
