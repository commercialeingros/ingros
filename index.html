<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giacenze Ingros</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ingros App">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { color: #dc2626; font-weight: bold; }
        .modal-bottom { transform: translateY(100%); transition: transform 0.3s ease-out; }
        .modal-bottom.active { transform: translateY(0); }
        .card-giacenza { border-left: 4px solid #dc2626; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        
    </style>
    
</head>
    
<body class="bg-gray-100 pb-24">

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8 text-center">
        <img src="data/IngrosCoperture.jpg" class="w-64 mb-10 shadow-lg rounded-lg" onerror="this.src='https://via.placeholder.com/200?text=LOGO+INGROS'">
        <h2 class="text-xl font-bold text-gray-700 mb-6">ACCESSO AGENTI ESTERNI</h2>
        <input type="password" id="access-code" placeholder="Inserisci Codice Accesso" class="w-full max-w-xs border-2 border-gray-300 rounded-xl p-4 text-center text-2xl mb-4 focus:border-red-600 outline-none">
        <button onclick="checkAccess()" class="bg-red-600 text-white font-bold py-4 px-12 rounded-xl w-full max-w-xs shadow-lg active:scale-95 transition-transform">ENTRA</button>
        <p id="login-error" class="text-red-600 mt-4 hidden font-semibold italic">Codice errato o utente disabilitato</p>
    </div>

    <div id="app-content" class="hidden">
        <div id="loading-spinner" class="hidden fixed inset-0 bg-white/60 z-[80] flex flex-col items-center justify-center backdrop-blur-sm">
            <div class="w-12 h-12 border-4 border-gray-200 border-t-red-600 rounded-full animate-spin mb-4"></div>
            <p class="text-red-600 font-bold text-sm animate-pulse uppercase tracking-widest">Caricamento dati...</p>
        </div>
        <header class="bg-white shadow-md sticky top-0 z-40 p-4">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 id="current-category-title" class="text-2xl font-black text-gray-800 uppercase tracking-tight">Copertura</h1>
                    <p id="user-welcome" class="text-xs text-gray-500 font-bold uppercase"></p>
                </div>
                <div class="flex gap-4 items-center">
                    <button onclick="toggleSettings()" class="text-gray-400 hover:text-red-600"><i class="fa-solid fa-circle-user text-2xl"></i></button>
                    <button onclick="toggleFilters()" class="relative bg-red-600 text-white p-3 rounded-xl shadow-lg active:scale-95 transition-transform">
                        <i class="fa-solid fa-sliders"></i>
                        <span id="filter-counter" class="hidden absolute -top-2 -right-2 bg-black text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">
                            0
                        </span>
                    </button>
                </div>
            </div>
            
        </header>

        <main id="card-list" class="p-3 space-y-3">
            </main>

        <div id="filter-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-end">
            <div class="bg-white w-full p-6 rounded-t-3xl shadow-2xl space-y-4 max-h-[85vh] overflow-y-auto">
                <div class="flex justify-between items-center border-b pb-3">
                    <h3 class="font-bold text-lg">FILTRI AVANZATI</h3>
                    <button onclick="resetFilters()" class="text-red-600 text-sm font-bold">RESETTA</button>
                </div>
                <div id="filter-rows" class="space-y-4 pt-2">
                    </div>
                <button onclick="toggleFilters()" class="w-full bg-black text-white py-4 rounded-xl font-bold mt-4">APPLICA FILTRI</button>
            </div>
        </div>

        <div id="settings-modal" class="fixed inset-0 bg-white z-[70] hidden p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black">IMPOSTAZIONI</h2>
                <button onclick="toggleSettings()" class="text-3xl text-gray-400">&times;</button>
            </div>
            <div class="space-y-6">
                <h3 class="font-bold border-b pb-2">RUBRICA UNITÀ LOCALI (WhatsApp)</h3>
                <div id="rubrica-list" class="space-y-4">
                    </div>
                <button onclick="saveRubrica()" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold">SALVA RUBRICA</button>
            </div>
        </div>

        <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
    
    <button onclick="switchTab('copertura')" id="tab-copertura" class="flex flex-col items-center text-gray-400 transition-all duration-300 transform active:scale-90">
        <i class="fa-solid fa-house-chimney-window text-xl"></i>
        <span class="text-[10px] mt-1 font-bold">COPERTURA</span>
    </button>

    <button onclick="switchTab('parete')" id="tab-parete" class="flex flex-col items-center text-gray-400 transition-all duration-300 transform active:scale-90">
        <i class="fa-solid fa-border-top-left text-xl"></i>
        <span class="text-[10px] mt-1 font-bold">PARETE</span>
    </button>

    <button onclick="switchTab('policarbonati')" id="tab-policarbonati" class="flex flex-col items-center text-gray-400 transition-all duration-300 transform active:scale-90">
        <i class="fa-solid fa-layer-group text-xl"></i>
        <span class="text-[10px] mt-1 font-bold">POLICARB.</span>
    </button>

    <button onclick="switchTab('lam_grecate')" id="tab-lam_grecate" class="flex flex-col items-center text-gray-400 transition-all duration-300 transform active:scale-90">
        <i class="fa-solid fa-barcode text-xl"></i>
        <span class="text-[10px] mt-1 font-bold">GRECATE</span>
    </button>

</nav>
    </div>

    <script>
        // --- CONFIGURAZIONE ---
        let currentData = [];
        let currentTab = 'copertura';
        let currentUser = null;
        let rubrica = {}; // Inizia vuota, verrà popolata dal file o dal localStorage

        // --- CARICAMENTO RUBRICA ---
        async function loadRubrica() {
            // 1. Prova a caricare la rubrica personalizzata dal telefono (localStorage)
            const localRubrica = localStorage.getItem('ingros_rubrica');
    
            if (localRubrica) {
                rubrica = JSON.parse(localRubrica);
            } else {
            // 2. Se non esiste, scarica quella predefinita da GitHub
            try {
                const resp = await fetch(`data/rubrica.json?v=${Date.now()}`);
                rubrica = await resp.json();
                // Salva una copia locale come base
                localStorage.setItem('ingros_rubrica', JSON.stringify(rubrica));
            } catch (err) {
                console.error("Errore nel caricamento della rubrica esterna");
                // Fallback di emergenza
                rubrica = { "Modugno": "000", "Piacenza": "000" };
            }
            }
        }
        // Aggiorna la funzione checkAccess per includere il caricamento rubrica
async function checkAccess() {
    const inputCode = document.getElementById('access-code').value;
    try {
        const resp = await fetch(`data/users.json?v=${Date.now()}`);
        const users = await resp.json();
        currentUser = users.find(u => u.codice === inputCode);

        if (currentUser) {
            await loadRubrica(); // <-- Carica la rubrica dopo il login
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('user-welcome').innerText = `${currentUser.nome} ${currentUser.cognome}`;
            switchTab('copertura');
        } else {
            document.getElementById('login-error').classList.remove('hidden');
        }
    } catch (err) { alert("Errore connessione server."); }
}
        
        // --- NAVIGAZIONE & CARICAMENTO ---
       async function switchTab(tab) {
            // Feedback per iOS/Android: Mini rimbalzo visivo
            const btn = document.getElementById(`tab-${tab}`);
            btn.classList.add('scale-90', 'opacity-50');
    
            // Tenta la vibrazione (funzionerà se salvata in Home o su Android)
            if (navigator.vibrate) navigator.vibrate(20);

            setTimeout(() => {
                btn.classList.remove('opacity-50');
            }, 100);

    // MOSTRA LO SPINNER
    const spinner = document.getElementById('loading-spinner');
    spinner.classList.remove('hidden');

    currentTab = tab;
    document.getElementById('current-category-title').innerText = tab.replace('_', ' ').toUpperCase();
    
    // UI Tab active
    document.querySelectorAll('nav button').forEach(btn => {
        btn.classList.remove('text-red-600', 'scale-110');
        btn.classList.add('text-gray-400');
    });
    const activeBtn = document.getElementById(`tab-${tab}`);
    activeBtn.classList.remove('text-gray-400');
    activeBtn.classList.add('text-red-600', 'scale-110');

    try {
        // Caricamento dati con timestamp per evitare cache
        const resp = await fetch(`data/${tab}.json?v=${Date.now()}`);
        if (!resp.ok) throw new Error("File non trovato");
        
        currentData = await resp.json();
        
        // Ordina per lunghezza decrescente
        currentData.sort((a, b) => (parseFloat(b.Lunghezza) || 0) - (parseFloat(a.Lunghezza) || 0));
        
        generateFilterUI();
        applyFilters();
        
        window.scrollTo({ top: 0, behavior: 'smooth' });

    } catch (err) { 
        alert("Errore nel caricamento dei dati di " + tab);
    } finally {
        // NASCONDI LO SPINNER (anche in caso di errore)
        // Aggiungiamo un piccolo delay di 300ms per evitare fastidiosi "flash" se il caricamento è troppo veloce
        setTimeout(() => {
            spinner.classList.add('hidden');
        }, 300);
    }
}

        // --- FILTRI DINAMICI ---
        function generateFilterUI() {
            const container = document.getElementById('filter-rows');
            container.innerHTML = "";
            let fields = [];

            if (currentTab === 'copertura' || currentTab === 'parete') {
                fields = ["Unita_locale", "Modello", "Isolante", "Altezza", "Colore_EST", "Colore_INT", "SP_EST","SP_INT" ];
            } else if (currentTab === 'policarbonati') {
                fields = ["Unita_locale", "Modello", "Spessore", "Colore"];
            } else {
                fields = ["Unita_locale", "Tipo_Materiale", "Colore", "Spessore"];
            }

            fields.forEach(f => {
                const values = [...new Set(currentData.map(item => item[f]))].filter(v => v).sort();
                let options = `<option value="">Tutti - ${f.replace('_', ' ')}</option>`;
                values.forEach(v => options += `<option value="${v}">${v}</option>`);
                
                container.innerHTML += `
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">${f}</label>
                        <select id="filter-${f}" onchange="applyFilters()" class="w-full border rounded-lg p-2 bg-gray-50">${options}</select>
                    </div>`;
            });
        }

       function applyFilters() {
    const selectFilters = document.querySelectorAll('#filter-rows select');
    let activeCount = 0;

    // 1. Calcoliamo quanti filtri sono attivi (hanno un valore selezionato)
    selectFilters.forEach(s => {
        if (s.value && s.value !== "") {
            activeCount++;
        }
    });

    // 2. Filtriamo i dati
    let filtered = currentData.filter(item => {
        let matchSelect = true;
        selectFilters.forEach(s => {
            const field = s.id.replace('filter-', '');
            if (s.value && item[field] != s.value) {
                matchSelect = false;
            }
        });
        return matchSelect;
    });

    // 3. Gestione visiva del contatore (Pallino Nero)
    const counterElem = document.getElementById('filter-counter');
    if (activeCount > 0) {
        counterElem.innerText = activeCount;
        counterElem.classList.remove('hidden');
    } else {
        counterElem.innerText = "0";
        counterElem.classList.add('hidden');
    }

    renderCards(filtered);
}
   
        // --- RENDERING CARD ---
       function renderCards(data) {
           // 1. Definiamo le variabili base
            const container = document.getElementById('card-list');
            container.innerHTML = data.map(item => {
            const lunghezza = item.Lunghezza || '0';
            const pezzi = item.Quantita_1 || '0';
            const um = item.UM_1 || 'PZ';
            const testataCard = `${lunghezza} x ${pezzi} ${um}`;
            // 2. PREPARAZIONE DATI PER WHATSAPP (Qui inseriamo le righe)
            // Puliamo la descrizione da eventuali apostrofi che bloccherebbero il codice
            const desc = (item.Descrizione || '').replace(/'/g, "\\'"); 
            // Creiamo la lista di argomenti da passare alla funzione sendWA
            const waArgs = `'${item.Unita_locale}', '${item.Articolo}', '${desc}', '${lunghezza}', '${pezzi}'`;
        // 3. Generiamo l'HTML della card        
        return `
            <div class="bg-white p-4 rounded-xl shadow-sm card-giacenza relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-red-100 text-red-600 px-3 py-1 font-black rounded-bl-xl text-sm border-l border-b border-red-200">
                    ${testataCard}
                </div>

                <div class="text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-widest">
                    ${item.Unita_locale}
                </div>

                <div class="text-sm text-gray-600 mb-1 font-normal italic">
                    Art. ${item.Articolo}
                </div>

                <div class="font-bold text-gray-800 text-base leading-tight mb-3">
                    ${item.Descrizione}
                </div>
                
                <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-[11px] bg-gray-50 p-2 rounded-lg border border-gray-100">
                    <div><span class="text-gray-400 uppercase font-bold">Altezza:</span> ${item.Altezza || '-'}</div>
                    <div><span class="text-gray-400 uppercase font-bold">Isolante:</span> ${item.Isolante || item.Spessore || '-'}</div>
                    
                    <div class="col-span-1 border-t border-gray-200 mt-1 pt-1">
                        <span class="text-gray-400 uppercase font-bold text-[9px]">Colore Est:</span><br>${item.Colore_EST || item.Colore || '-'}
                    </div>
                    <div class="col-span-1 border-t border-gray-200 mt-1 pt-1">
                        <span class="text-gray-400 uppercase font-bold text-[9px]">Colore Int:</span><br>${item.Colore_INT || '-'}
                    </div>

                    <div class="col-span-1 border-t border-gray-200 pt-1">
                        <span class="text-gray-400 uppercase font-bold text-[9px]">Sp. Est (mm):</span><br>${item.SP_EST || '-'}
                    </div>
                    <div class="col-span-1 border-t border-gray-200 pt-1">
                        <span class="text-gray-400 uppercase font-bold text-[9px]">Sp. Int (mm):</span><br>${item.SP_INT || '-'}
                    </div>
                </div>

                <button onclick="sendWA(${waArgs})" 
                    class="mt-3 w-full bg-green-500 text-white py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-sm active:bg-green-600 shadow-sm">
                    <i class="fa-brands fa-whatsapp text-lg"></i> RICHIEDI INFO
                </button>
            </div>
        `;
    }).join('');
}

        // --- WHATSAPP & IMPOSTAZIONI ---
        function sendWA(sede, art, desc, lung, pz) {
            const num = rubrica[sede] || "";
            if(!num) { 
                alert("Attenzione: Numero non impostato per la sede di " + sede + ". Vai nelle impostazioni."); 
                return; 
            }

        // Costruzione del messaggio
        const riga1 = `*RICHIESTA INFO GIACENZA*`;
        const riga2 = `Articolo: ${art}`;
        const riga3 = `Descrizione: ${desc}`;
        const riga4 = `Misura: *${lung} x ${pz} PZ*`;
        const riga5 = `Sede: ${sede}`;
        const riga6 = `Richiedente: ${currentUser.nome} ${currentUser.cognome}`;

        const messaggioCompleto = `${riga1}\n\n${riga2}\n${riga3}\n${riga4}\n\n${riga5}\n${riga6}`;
    
        // Apre WhatsApp
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(messaggioCompleto)}`);
    }

        function toggleSettings() {
            const mod = document.getElementById('settings-modal');
            if (mod.classList.contains('hidden')) {
                const list = document.getElementById('rubrica-list');
                list.innerHTML = Object.keys(rubrica).map(s => `
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-gray-400 uppercase">${s}</label>
                        <input type="text" value="${rubrica[s]}" data-sede="${s}" class="border p-3 rounded-xl bg-gray-50 font-mono">
                    </div>
                `).join('');
                mod.classList.remove('hidden');
            } else { mod.classList.add('hidden'); }
        }

        function saveRubrica() {
            document.querySelectorAll('#rubrica-list input').forEach(i => {
                rubrica[i.dataset.sede] = i.value;
            });
            localStorage.setItem('ingros_rubrica', JSON.stringify(rubrica));
            alert("Rubrica salvata sul telefono!");
            toggleSettings();
        }

        function toggleFilters() {
            const m = document.getElementById('filter-modal');
            m.classList.toggle('hidden');
        }

        function resetFilters() {
            // Svuota tutte le select
            document.querySelectorAll('#filter-rows select').forEach(s => {
                s.value = "";
            });
    
            // Riesegue il filtro (che ora sarà vuoto e resetterà il contatore)
            applyFilters();
        }

    </script>
</body>
</html>
