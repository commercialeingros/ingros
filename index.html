<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giacenze Ingros</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ingros App">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab-active { color: #e11d48; border-top: 2px solid #e11d48; }
        .filter-badge { background: #e11d48; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; position: absolute; top: -5px; right: -5px; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6">
        <img src="data/IngrosCoperture.jpg" class="w-48 mb-8">
        <h1 class="text-2xl font-bold mb-4">Accesso Utenti</h1>
        <input type="password" id="access-code" placeholder="Inserisci il tuo codice" class="w-full max-w-xs border-2 border-gray-300 rounded-lg p-3 mb-4 text-center text-xl">
        <button onclick="checkAccess()" class="bg-red-600 text-white px-8 py-3 rounded-lg font-bold w-full max-w-xs">ENTRA</button>
        <p id="login-error" class="text-red-500 mt-4 hidden">Codice non valido o utente rimosso.</p>
    </div>

    <div id="main-app" class="hidden pb-20">
        <header class="bg-white p-4 sticky top-0 z-40 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 id="page-title" class="text-2xl font-bold text-gray-800">Copertura</h1>
                <div class="flex gap-4">
                    <button onclick="openSettings()"><i class="fa-solid fa-gear text-gray-500 text-xl"></i></button>
                    <div class="relative">
                        <button onclick="toggleFilterModal()"><i class="fa-solid fa-sliders text-gray-500 text-xl"></i></button>
                        <span id="active-filters-count" class="hidden filter-badge">0</span>
                    </div>
                </div>
            </div>
            <input type="text" id="search-bar" oninput="applyFilters()" placeholder="Cerca..." class="w-full bg-gray-100 rounded-xl p-3 pl-10 focus:outline-none focus:ring-2 focus:ring-red-500">
        </header>

        <main id="card-container" class="p-4 space-y-4">
            </main>

        <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 z-50">
            <button onclick="switchTab('copertura')" class="flex flex-col items-center text-gray-400 tab-btn" id="btn-copertura">
                <i class="fa-solid fa-warehouse text-xl"></i><span class="text-xs">Copertura</span>
            </button>
            <button onclick="switchTab('parete')" class="flex flex-col items-center text-gray-400 tab-btn" id="btn-parete">
                <i class="fa-solid fa-border-all text-xl"></i><span class="text-xs">Parete</span>
            </button>
            <button onclick="switchTab('policarbonati')" class="flex flex-col items-center text-gray-400 tab-btn" id="btn-policarbonati">
                <i class="fa-solid fa-layer-group text-xl"></i><span class="text-xs">Policarb.</span>
            </button>
            <button onclick="switchTab('lam_grecate')" class="flex flex-col items-center text-gray-400 tab-btn" id="btn-lam_grecate">
                <i class="fa-solid fa-sheet-plastic text-xl"></i><span class="text-xs">Grecate</span>
            </button>
        </nav>
    </div>

    <script>
        // Logica per il caricamento degli utenti e il controllo accesso
        async function checkAccess() {
            const code = document.getElementById('access-code').value;
            try {
                // Legge il file utenti da GitHub
                const response = await fetch('data/users.json');
                const users = await response.json();
                const user = users.find(u => u.codice === code);

                if (user) {
                    localStorage.setItem('user_logged', JSON.stringify(user));
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    initApp();
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch (e) {
                alert("Errore nel caricamento del file utenti. Verifica il file data/users.json su GitHub.");
            }
        }

        // Funzione per inviare WhatsApp
        function sendWhatsApp(unitaLocale, articolo) {
            const rubrica = JSON.parse(localStorage.getItem('rubrica')) || { "Modugno": "393xxxx", "Piacenza": "340xxxx" };
            const tel = rubrica[unitaLocale] || "";
            const msg = `Ciao, sono interessato all'articolo: ${articolo} presso la sede di ${unitaLocale}.`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
